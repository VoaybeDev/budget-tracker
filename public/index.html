<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- Icône dynamique : URL d'une icône Budget/Finance -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2331/2331970.png" type="image/png" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2331/2331970.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2E7D32" />
  <meta
    name="description"
    content="Application de suivi de budget personnel"
  />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Titre dynamique récupéré via script -->
  <title>Chargement...</title>

  <script>
    // Récupération dynamique du nom et de l'icône depuis une API/URL distante
    fetch("https://api.jsonbin.io/v3/qs/budget-config", {
      method: "GET",
      headers: { "Content-Type": "application/json" }
    })
    .then(res => res.json())
    .then(data => {
      // Met à jour le titre de l'onglet
      document.title = data.appName || "Budget Tracker 💰";

      // Met à jour l'icône si fournie par l'API
      if (data.iconUrl) {
        const link = document.querySelector("link[rel='icon']");
        if (link) link.href = data.iconUrl;
      }
    })
    .catch(() => {
      // Valeurs par défaut en cas d'échec
      document.title = "Budget Tracker 💰";
      console.warn("Config distante indisponible, valeurs par défaut utilisées.");
    });
  </script>
</head>
<body>
  <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
  <div id="root"></div>
</body>
</html>
